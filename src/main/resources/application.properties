spring.application.name=replay-lite-backend

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/replay-lite}

# Backblaze B2 (S3-compatible)
replay.storage.key-id=${BACKBLAZE_KEY_ID:}
replay.storage.application-key=${BACKBLAZE_APPLICATION_KEY:}
replay.storage.bucket-name=${BACKBLAZE_BUCKET_NAME:replay-modl-gg}
replay.storage.endpoint=${BACKBLAZE_ENDPOINT:https://s3.us-east-005.backblazeb2.com}
replay.storage.cdn-domain=${REPLAY_CDN_DOMAIN:replay-cdn.modl.gg}

# Auth
replay.auth.hmac-secret=${HMAC_SECRET:change-me-in-production}

# Viewer
replay.viewer.base-url=${VIEWER_BASE_URL:https://replays.modl.gg}

# Server
server.port=${PORT:8080}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
